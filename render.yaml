services:
  - type: web
    name: panzershrek-server
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    disk:
      name: panzershrek-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: WS_ALLOWED_ORIGINS
        sync: false
      - key: PLAYER_PROFILE_DB_PATH
        value: /var/data/player-profiles.json
      - key: PLAYER_ACCOUNT_DB_PATH
        value: /var/data/player-accounts.json
      - key: PLAYER_PAYMENT_DB_PATH
        value: /var/data/player-payments.json
      # Реквизиты магазина ЮKassa (значения задаются в дашборде Render).
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: YOOKASSA_RETURN_URL
        sync: false
      # Токен доступа к админ-панели (/api/admin/*).
      - key: ADMIN_TOKEN
        sync: false
      - key: PVP_RECONNECT_GRACE_MS
        value: "15000"
      - key: PVP_MATCH_WEIGHT_TOLERANCE
        value: "12"
      - key: WS_MAX_MESSAGE_BYTES
        value: "262144"
      - key: WS_RATE_LIMIT_WINDOW_MS
        value: "1000"
      - key: WS_RATE_LIMIT_MAX_MESSAGES
        value: "60"
      - key: WS_RATE_LIMIT_BLOCK_MS
        value: "2000"
