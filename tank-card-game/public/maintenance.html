<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0c0d0b" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Обновление PanzerShrek</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Georgia, "Times New Roman", serif;
        background: #080906;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: #eee2bd;
        background:
          linear-gradient(180deg, rgba(4, 5, 3, 0.42), rgba(4, 5, 3, 0.88)),
          radial-gradient(circle at 50% 42%, rgba(112, 101, 54, 0.18), transparent 42%),
          url('/menu-background.webp') center / cover no-repeat,
          #080906;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.24;
        background-image:
          repeating-linear-gradient(0deg, transparent 0 3px, rgba(255, 255, 255, 0.018) 3px 4px),
          radial-gradient(circle at center, transparent 30%, #020301 100%);
      }

      .panel {
        position: relative;
        width: min(680px, calc(100vw - 32px));
        padding: clamp(28px, 5vw, 52px);
        text-align: center;
        border: 1px solid rgba(201, 176, 103, 0.55);
        border-radius: 10px;
        background:
          linear-gradient(180deg, rgba(35, 37, 28, 0.96), rgba(12, 14, 11, 0.98));
        box-shadow:
          inset 0 1px rgba(255, 239, 181, 0.13),
          inset 0 0 52px rgba(0, 0, 0, 0.58),
          0 28px 80px rgba(0, 0, 0, 0.72);
      }

      .panel::before,
      .panel::after {
        content: "";
        position: absolute;
        left: 20px;
        right: 20px;
        height: 1px;
        background: linear-gradient(90deg, transparent, #9d884f, transparent);
      }

      .panel::before {
        top: 12px;
      }

      .panel::after {
        bottom: 12px;
      }

      .emblem {
        width: 68px;
        height: 68px;
        margin-bottom: 10px;
        filter: sepia(0.45) saturate(0.8) drop-shadow(0 4px 10px rgba(0, 0, 0, 0.7));
      }

      .code {
        margin: 0 0 8px;
        color: #bda768;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #f1e4bc;
        font-family: Arial, Helvetica, sans-serif;
        font-size: clamp(30px, 6vw, 52px);
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0.035em;
        text-transform: uppercase;
        text-shadow: 0 3px 0 #302b1c, 0 7px 16px rgba(0, 0, 0, 0.72);
      }

      .lead {
        max-width: 520px;
        margin: 22px auto 8px;
        font-size: clamp(18px, 3vw, 23px);
        font-weight: 700;
        line-height: 1.42;
      }

      .note {
        margin: 0 auto;
        color: rgba(231, 221, 190, 0.7);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        line-height: 1.45;
      }

      .signal {
        width: 58px;
        height: 58px;
        margin: 24px auto 20px;
        position: relative;
        border: 1px solid rgba(202, 177, 102, 0.32);
        border-radius: 50%;
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.62);
      }

      .signal::before,
      .signal::after {
        content: "";
        position: absolute;
        border-radius: 50%;
      }

      .signal::before {
        inset: 8px;
        border: 2px solid transparent;
        border-top-color: #d0b766;
        border-right-color: rgba(208, 183, 102, 0.35);
        animation: rotate 1.1s linear infinite;
      }

      .signal::after {
        inset: 24px;
        background: #d0b766;
        box-shadow: 0 0 12px rgba(208, 183, 102, 0.72);
      }

      button {
        width: min(330px, 100%);
        min-height: 56px;
        border: 1px solid #a68c4d;
        border-radius: 5px;
        color: #f4e6bc;
        background:
          linear-gradient(180deg, rgba(104, 101, 55, 0.94), rgba(49, 52, 29, 0.98));
        box-shadow:
          inset 0 1px rgba(255, 242, 183, 0.26),
          inset 0 -8px 18px rgba(0, 0, 0, 0.25),
          0 7px 18px rgba(0, 0, 0, 0.42);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 17px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.12);
      }

      button:active {
        transform: translateY(1px);
      }

      .retry {
        min-height: 20px;
        margin-top: 14px;
        color: rgba(224, 212, 174, 0.58);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
        letter-spacing: 0.04em;
      }

      @keyframes rotate {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-height: 620px) {
        .panel {
          padding-top: 22px;
          padding-bottom: 22px;
        }

        .emblem {
          width: 52px;
          height: 52px;
        }

        .signal {
          margin-top: 14px;
          margin-bottom: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .signal::before {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <img class="emblem" src="/panzer-shrek-icon.png" alt="" />
      <p class="code">Служебное сообщение · 503</p>
      <h1>Идёт обновление</h1>
      <p class="lead">
        Командование устанавливает новую версию игры. Сервер скоро вернётся в строй.
      </p>
      <p class="note">Прогресс аккаунта сохранён. Обычно обновление занимает несколько минут.</p>
      <div class="signal" aria-label="Ожидание ответа сервера"></div>
      <button type="button" onclick="window.location.reload()">Попробовать снова</button>
      <div class="retry" id="retry">Автоматическая проверка через 15 секунд</div>
    </main>
    <script>
      const retryLabel = document.getElementById('retry')
      let secondsLeft = 15

      const timer = window.setInterval(() => {
        secondsLeft -= 1
        retryLabel.textContent = `Автоматическая проверка через ${secondsLeft} сек.`

        if (secondsLeft <= 0) {
          window.clearInterval(timer)
          window.location.reload()
        }
      }, 1000)
    </script>
  </body>
</html>
